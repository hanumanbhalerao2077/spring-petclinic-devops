name: CI and Container Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw -B test

      - name: Package application
        run: ./mvnw -B -DskipTests package

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build application images
        run: |
          for service in spring-petclinic-config-server spring-petclinic-discovery-server spring-petclinic-customers-service spring-petclinic-visits-service spring-petclinic-vets-service spring-petclinic-genai-service spring-petclinic-api-gateway spring-petclinic-admin-server; do
            docker build --file "$service/Dockerfile" --tag "$service:ci" .
          done

      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Push images to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        run: |
          for service in spring-petclinic-config-server spring-petclinic-discovery-server spring-petclinic-customers-service spring-petclinic-visits-service spring-petclinic-vets-service spring-petclinic-genai-service spring-petclinic-api-gateway spring-petclinic-admin-server; do
            docker tag "$service:ci" "${{ env.DOCKERHUB_USERNAME }}/$service:ci"
            docker push "${{ env.DOCKERHUB_USERNAME }}/$service:ci"
          done

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: spring-petclinic-api-gateway:ci
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0
